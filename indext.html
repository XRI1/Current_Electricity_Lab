<style>
:root{

*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;font-family:Inter,"Noto Sans Bengali",Segoe UI,system-ui,sans-serif;color:var(--text);background:#061826;user-select:none;-webkit-user-select:none}

#side{grid-area:side;padding:14px;overflow:auto;display:flex;flex-direction:column;gap:14px}.card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:13px}.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.09);font-size:13px;font-weight:700}.toggle-row:last-child{border-bottom:0}.switch{width:42px;height:23px;border-radius:999px;background:rgba(255,255,255,.18);position:relative;cursor:pointer}.switch input{display:none}.knob{position:absolute;width:18px;height:18px;left:3px;top:2.5px;background:white;border-radius:50%;transition:.2s}.switch input:checked+.knob{left:21px;background:var(--cyan);box-shadow:0 0 14px rgba(56,216,255,.8)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions .btn{width:100%;padding:11px 8px}.mini-help{font-size:12px;line-height:1.55;color:var(--muted)}
#bottom{grid-area:bottom;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;background:transparent;box-shadow:none;border:0}.meter{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:10px 12px;display:flex;align-items:center;gap:10px;overflow:hidden;position:relative}.meter::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(56,216,255,.08),transparent);transform:translateX(-100%);animation:shine 3s infinite}.meter-icon{width:38px;height:38px;border-radius:14px;background:rgba(56,216,255,.14);display:grid;place-items:center;font-size:18px}.meter-label{font-size:10px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:1px}.meter-value{font-size:18px;font-weight:950;font-variant-numeric:tabular-nums}.status-open{color:var(--red)}.status-closed{color:var(--green)}@keyframes shine{to{transform:translateX(100%)}}
.svg-component{cursor:pointer}.selection-ring{fill:none;stroke:var(--amber);stroke-width:2;stroke-dasharray:5 5;opacity:0;filter:drop-shadow(0 0 8px rgba(255,209,102,.8));animation:dash 8s linear infinite}.svg-component.selected .selection-ring{opacity:1}@keyframes dash{to{stroke-dashoffset:-80}}.terminal{fill:#e8f8ff;stroke:#062234;stroke-width:2;cursor:crosshair}.terminal.connected{fill:var(--green);filter:drop-shadow(0 0 8px rgba(94,234,212,.8))}.terminal.hover{fill:var(--amber);r:8;filter:drop-shadow(0 0 12px rgba(255,209,102,.9))}.wire{stroke:#9fb8c8;stroke-width:4;stroke-linecap:round;fill:none}.wire.energized{stroke:var(--cyan);stroke-width:5;filter:drop-shadow(0 0 9px rgba(56,216,255,.85));animation:wirePulse .9s ease-in-out infinite alternate}.wire.preview{stroke:var(--amber);stroke-dasharray:7 5;opacity:.8}@keyframes wirePulse{from{opacity:.72}to{opacity:1}}.electron{fill:#fff;filter:drop-shadow(0 0 7px rgba(56,216,255,1))}.label-text{font-size:12px;font-weight:900;fill:#f6fcff;paint-order:stroke;stroke:#062033;stroke-width:4}.value-text{font-size:10px;font-weight:900;fill:var(--cyan);paint-order:stroke;stroke:#062033;stroke-width:4}
#edit,#learn{position:fixed;z-index:50;display:none}.popup{background:rgba(5,22,38,.92);border:1px solid rgba(56,216,255,.28);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.4);backdrop-filter:blur(18px);padding:15px;min-width:260px}#edit.popup.show{display:block}.popup h3{margin:0 0 12px;display:flex;justify-content:space-between;align-items:center;font-size:15px}.x{cursor:pointer;color:var(--muted);font-size:22px}.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:900;color:var(--muted);margin-bottom:6px}.field input{width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:white;border-radius:12px;padding:10px;font-size:15px;font-weight:900}.read{display:flex;justify-content:space-between;background:rgba(255,255,255,.1);padding:9px 10px;border-radius:12px;margin:8px 0;font-size:13px;font-weight:800}.read b{color:var(--cyan)}.popup-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
#learn{inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:16px}.learn-box{width:min(760px,96vw);max-height:88vh;overflow:hidden}.learn-head{padding:18px 20px;background:linear-gradient(135deg,rgba(56,216,255,.25),rgba(255,255,255,.08));display:flex;justify-content:space-between;align-items:center}.learn-head h2{margin:0;font-size:20px}.learn-body{padding:18px;overflow:auto;max-height:70vh}.topic{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:16px;margin-bottom:10px;overflow:hidden}.topic summary{padding:13px 15px;cursor:pointer;font-weight:950}.topic div{padding:0 15px 14px;color:#c9e7f4;line-height:1.6;font-size:14px}.formula{display:inline-block;background:rgba(56,216,255,.12);border:1px solid rgba(56,216,255,.25);padding:5px 10px;border-radius:10px;color:#fff;font-weight:950}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);background:rgba(3,15,25,.9);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:11px 18px;color:white;font-weight:800;font-size:13px;opacity:0;transition:.25s;z-index:80}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:960px){#app{grid-template-columns:1fr;grid-template-rows:62px 74px 1fr auto auto;grid-template-areas:"top" "tools" "lab" "side" "bottom";gap:8px;padding:8px}#tools{padding:8px;overflow-x:auto}.tool-title{display:none}.tool-list{flex-direction:row}.tool{min-width:78px;height:58px}.tool svg{width:44px;height:27px}.tool span{font-size:10px}#side{max-height:230px}.actions{grid-template-columns:repeat(4,1fr)}#bottom{grid-template-columns:repeat(5,minmax(120px,1fr));overflow-x:auto}.meter{min-width:120px}.top-actions .btn span{display:none}}
@media(max-width:520px){h1{font-size:14px}.sub{display:none}.logo{width:38px;height:38px}.btn{padding:9px}.tool span{display:none}.tool{min-width:58px}.meter-value{font-size:15px}.meter-icon{display:none}.actions{grid-template-columns:1fr 1fr}.lang-btn{min-width:auto}}
</style>
</head>
<body>
<div id="app">
  <header id="top" class="glass">
    <div class="brand"><div class="logo">⚡</div><div><h1 data-i="title">Current Electricity Lab</h1><div class="sub" data-i="subtitle">Class 10 Physics · Interactive Circuit Simulator</div></div></div>
    <div class="top-actions"><button class="btn lang-btn" id="langBtn">বাংলা</button><button class="btn primary" id="learnBtn">📘 <span data-i="learn">Learn</span></button></div>
  </header>
  <aside id="tools" class="glass"><div class="tool-title" data-i="components">Components</div><div class="tool-list" id="toolList"></div></aside>
  <main id="lab" class="glass"><svg id="canvas"></svg><div id="hint" class="hint"></div></main>
  <aside id="side" class="glass">
    <div class="card"><div class="section-title" data-i="display">Display</div>
      <div class="toggle-row"><span data-i="showCurrent">Show Current</span><label class="switch"><input id="showCurrent" type="checkbox" checked><span class="knob"></span></label></div>
      <div class="toggle-row"><span data-i="flowMode">Conventional Flow</span><label class="switch"><input id="flowMode" type="checkbox"><span class="knob"></span></label></div>
      <div class="toggle-row"><span data-i="showLabels">Show Labels</span><label class="switch"><input id="showLabels" type="checkbox" checked><span class="knob"></span></label></div>
      <div class="toggle-row"><span data-i="showValues">Show Values</span><label class="switch"><input id="showValues" type="checkbox" checked><span class="knob"></span></label></div>
    </div>
    <div class="card"><div class="section-title" data-i="actions">Actions</div><div class="actions"><button class="btn primary" id="defaultBtn" data-i="defaultBtn">↻ Default</button><button class="btn warn" id="clearBtn" data-i="clearBtn">⌫ Clear</button><button class="btn" id="rotateBtn" data-i="rotateBtn">⟳ Rotate</button><button class="btn danger" id="deleteBtn" data-i="deleteBtn">🗑 Delete</button></div></div>
    <div class="card mini-help" id="helpText"></div>
  </aside>
  <footer id="bottom">
    <div class="meter"><div class="meter-icon">🔌</div><div><div class="meter-label" data-i="circuit">Circuit</div><div class="meter-value" id="mStatus">Open</div></div></div>
    <div class="meter"><div class="meter-icon">V</div><div><div class="meter-label" data-i="voltage">Voltage</div><div class="meter-value"><span id="mVolt">0.0</span> V</div></div></div>
    <div class="meter"><div class="meter-icon">Ω</div><div><div class="meter-label" data-i="resistance">Resistance</div><div class="meter-value"><span id="mRes">0.0</span> Ω</div></div></div>
    <div class="meter"><div class="meter-icon">A</div><div><div class="meter-label" data-i="current">Current</div><div class="meter-value"><span id="mCur">0.000</span> A</div></div></div>
    <div class="meter"><div class="meter-icon">W</div><div><div class="meter-label" data-i="power">Power</div><div class="meter-value"><span id="mPow">0.00</span> W</div></div></div>
  </footer>
</div>
<div id="edit" class="popup"><h3><span id="editTitle">Edit</span><span class="x" id="closeEdit">×</span></h3><div class="field" id="valueField"><label id="valueLabel">Value</label><input type="number" id="valueInput" min="0" step="0.1"></div><div id="readings"></div><div class="popup-actions"><button class="btn" id="popupRotate" data-i="rotateBtn">⟳ Rotate</button><button class="btn danger" id="popupDelete" data-i="deleteBtn">Delete</button></div></div>
<div id="learn"><div class="learn-box glass"><div class="learn-head"><h2 id="learnTitle">📘 Learn Current Electricity</h2><button class="btn" id="closeLearn">×</button></div><div class="learn-body" id="learnBody"></div></div></div>
<div class="toast" id="toast"></div>

function electrons(a,b,I,t){if(!I||I<1e-6)return'';let dx=b.x-a.x,dy=b.y-a.y,L=Math.hypot(dx,dy);if(L<5)return'';let ux=dx/L,uy=dy/L,speed=Math.min(160,50+I*200),count=Math.max(1,Math.floor(L/34)),phase=(t/1000)*speed*(state.flow?1:-1),out='';for(let i=0;i<count;i++){let q=((i*34+phase)%L+L)%L,x=a.x+ux*q,y=a.y+uy*q;out+=`<circle class="electron" cx="${x}" cy="${y}" r="3.2"/><path d="M ${x-ux*7} ${y-uy*7} L ${x} ${y}" stroke="rgba(255,255,255,.65)" stroke-width="2" stroke-linecap="round"/>`}return out}
function solveRender(){state.solution=solve();updateMeters();render()}function solve(){let sol={closed:false,totalV:0,totalR:Infinity,totalCurrent:0,totalP:0,components:{}};for(let c of state.components)sol.components[c.id]={current:0,voltage:0,power:0,glow:0,reading:0};let bat=state.components.find(c=>c.type==='battery');if(!bat)return sol;sol.totalV=bat.value;let active=state.components.filter(c=>(c.type==='resistor'||c.type==='bulb'||c.type==='ammeter'||(c.type==='switch'&&c.closed)));let swOpen=state.components.some(c=>c.type==='switch'&&!c.closed);let hasLoop=state.connections.length>=state.components.length&&!swOpen&&active.length>0;sol.closed=hasLoop;if(!hasLoop)return sol;let R=0;for(let c of active){if(c.type==='resistor'||c.type==='bulb')R+=Math.max(.001,c.value);if(c.type==='ammeter'||c.type==='switch')R+=.001}let I0=bat.value/R;sol.totalR=R;sol.totalCurrent=I0;sol.totalP=bat.value*I0;for(let c of state.components){if(c.type==='battery')sol.components[c.id]={current:I0,voltage:c.value,power:c.value*I0,glow:0,reading:0};else if(c.type==='resistor'||c.type==='bulb'){let v=I0*c.value,p=v*I0;sol.components[c.id]={current:I0,voltage:v,power:p,glow:c.type==='bulb'?Math.min(1,p/((6*6)/Math.max(.001,c.value))):0,reading:0}}else if(c.type==='ammeter'){sol.components[c.id].reading=I0;sol.components[c.id].current=I0}else if(c.type==='voltmeter'){sol.components[c.id].reading=bat.value}else if(c.type==='switch'){sol.components[c.id].current=c.closed?I0:0}}return sol}
function updateMeters(){let s=state.solution||{};$('#mStatus').textContent=s.closed?T('closed'):T('open');$('#mStatus').className='meter-value '+(s.closed?'status-closed':'status-open');$('#mVolt').textContent=fmt(s.totalV||0,1);$('#mRes').textContent=isFinite(s.totalR)?fmt(s.totalR,1):'∞';$('#mCur').textContent=fmt(s.totalCurrent||0,3);$('#mPow').textContent=fmt(s.totalP||0,2)}
function showEdit(c,x,y){let e=$('#edit');e.classList.add('show');e.dataset.id=c.id;$('#editTitle').textContent=`${T('edit')}: ${I[lang].tools[c.type]}`;let field=$('#valueField');if(c.type==='battery'||c.type==='resistor'||c.type==='bulb'){field.style.display='block';$('#valueLabel').textContent=c.type==='battery'?T('voltageInput'):T('resistanceInput');$('#valueInput').value=c.value}else field.style.display='none';refreshRead(c);let r=e.getBoundingClientRect();let left=Math.max(10,Math.min(innerWidth-r.width-10,x+10));let top=Math.max(10,Math.min(innerHeight-r.height-10,y+10));e.style.left=left+'px';e.style.top=top+'px';}function hideEdit(){$('#edit').classList.remove('show')}function refreshRead(c){let i=state.solution?.components[c.id]||{};$('#readings').innerHTML=`<div class="read"><span>${T('readingCurrent')}</span><b>${fmt(Math.abs(i.current||i.reading||0),3)} A</b></div><div class="read"><span>${T('readingVoltage')}</span><b>${fmt(Math.abs(i.voltage||i.reading||0),2)} V</b></div>${i.power?`<div class="read"><span>${T('readingPower')}</span><b>${fmt(i.power,3)} W</b></div>`:''}`}
$('#closeEdit').onclick=hideEdit;
function updateComponentValueFromInput(){
  const editBox = $('#edit');
  const editId = Number(editBox.dataset.id);
  const c = state.components.find(item => item.id === editId);
  const input = $('#valueInput');
  const v = Number(input.value);
  if(!c || !Number.isFinite(v) || v <= 0) return;
  c.value = v;
  state.solution = solve();
  updateMeters();
  render();
  refreshRead(c);
}
$('#valueInput').oninput = updateComponentValueFromInput;
$('#valueInput').onchange = updateComponentValueFromInput;$('#popupRotate').onclick=()=>rotateC(parseInt($('#edit').dataset.id));$('#popupDelete').onclick=()=>del(parseInt($('#edit').dataset.id));$('#rotateBtn').onclick=()=>state.selected?rotateC(state.selected):say(T('selectFirst'));$('#deleteBtn').onclick=()=>state.selected?del(state.selected):say(T('selectFirst'));$('#clearBtn').onclick=()=>{state.components=[];state.connections=[];state.selected=null;hideEdit();solveRender();say(T('cleared'))};$('#defaultBtn').onclick=()=>{loadDefault();say(T('defaultLoaded'))};$('#showCurrent').onchange=e=>{state.showCurrent=e.target.checked;render()};$('#flowMode').onchange=e=>{state.flow=e.target.checked;render()};$('#showLabels').onchange=e=>{state.labels=e.target.checked;render()};$('#showValues').onchange=e=>{state.values=e.target.checked;render()};$('#learnBtn').onclick=()=>$('#learn').style.display='flex';$('#closeLearn').onclick=()=>$('#learn').style.display='none';$('#learn').onclick=e=>{if(e.target.id==='learn')$('#learn').style.display='none'};$('#langBtn').onclick=()=>{lang=lang==='en'?'bn':'en';applyLang();say(lang==='bn'?'বাংলা মোড চালু হয়েছে':'English mode enabled')};window.onkeydown=e=>{if(e.target.tagName==='INPUT')return;if(e.key==='Escape'){state.tool=null;state.wire=null;state.near=null;$$('.tool').forEach(t=>t.classList.remove('active'));showHint('');hideEdit();render()}if(e.key==='Delete'||e.key==='Backspace'){if(state.selected)del(state.selected)}if(e.key.toLowerCase()==='r'&&state.selected)rotateC(state.selected)};
function learn(){$('#learnBody').innerHTML=I[lang].learnData.map(x=>`<details class="topic"><summary>${x[0]}</summary><div>${x[1]}</div></details>`).join('')}function loadDefault(){state.components=[];state.connections=[];state.next=1;state.selected=null;hideEdit();let cw=state.size.w,ch=state.size.h,cx=cw/2,cy=ch/2,W=Math.max(320,Math.min(540,cw-120)),H=Math.max(200,Math.min(310,ch-130));let left=snap(cx-W/2),right=snap(cx+W/2),top=snap(cy-H/2),bottom=snap(cy+H/2);let b={id:id(),type:'battery',x:left,y:cy,rotation:270,value:6},s={id:id(),type:'switch',x:cx,y:top,rotation:0,value:0,closed:true},l={id:id(),type:'bulb',x:right,y:cy,rotation:90,value:8},r={id:id(),type:'resistor',x:cx,y:bottom,rotation:0,value:4};state.components.push(b,s,l,r);let w=(a,ta,bb,tb)=>state.connections.push({id:id(),a:{id:a.id,t:ta},b:{id:bb.id,t:tb}});w(b,1,s,0);w(s,1,l,0);w(l,1,r,1);w(r,0,b,0);solveRender()}function anim(){if(state.showCurrent&&state.solution&&state.solution.closed)render();requestAnimationFrame(anim)}
window.addEventListener('resize',resize);applyLang();resize();loadDefault();anim();setTimeout(()=>say(T('ready')),600);
